name: appanimales
description: "App para mascotas perdidas y adopción"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_analytics: ^11.3.3
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.4
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.4
  photo_view: ^0.15.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/perro.jpeg
    - assets/gato.jpeg
    - assets/google_logo.png
